<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dwi Septiana — Guru Matematika</title>
<meta name="theme-color" content="#0a0e14">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg-deep:#0a0e14; --bg-elevated:#11161e; --bg-surface:#171c26; --bg-hover:#1c2330;
  --border-subtle:#1e2530; --border-default:#262d38;
  --text-primary:#e8ecf1; --text-secondary:#8b95a5; --text-tertiary:#5a6474;
  --accent-primary:#E0A63A; --accent-secondary:#4FA893;
  --accent-red:#f87171; --accent-green:#4ade80;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:20px;
  --safe-bottom:env(safe-area-inset-bottom,16px);
  --transition-fast:0.15s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;}
.app-shell{position:relative;z-index:10;width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;opacity:0;animation:appFadeIn .7s ease forwards;animation-delay:1.5s;}
@keyframes appFadeIn{to{opacity:1;}}

.splash-screen{position:fixed;inset:0;z-index:99999;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;animation:splashOut .6s ease forwards;animation-delay:1.6s;}
.splash-logo{width:78px;height:78px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;font-size:34px;color:#0a0e14;box-shadow:0 10px 40px rgba(224,166,58,.3);animation:splashPop .7s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:scale(.5);}
.splash-title{font-size:18px;font-weight:800;letter-spacing:-.01em;opacity:0;animation:splashFadeUp .6s ease forwards;animation-delay:.35s;}
.splash-sub{font-size:11px;color:var(--text-tertiary);font-weight:600;letter-spacing:.04em;opacity:0;animation:splashFadeUp .6s ease forwards;animation-delay:.5s;}
.splash-bar{width:120px;height:3px;background:var(--border-default);border-radius:4px;overflow:hidden;margin-top:6px;opacity:0;animation:splashFadeUp .6s ease forwards;animation-delay:.65s;}
.splash-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-primary),var(--accent-secondary));border-radius:4px;animation:splashLoad 1.1s cubic-bezier(.4,0,.2,1) forwards;animation-delay:.65s;}
@keyframes splashPop{to{opacity:1;transform:scale(1);}}
@keyframes splashFadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes splashLoad{to{width:100%;}}
@keyframes splashOut{to{opacity:0;visibility:hidden;pointer-events:none;}}

.cover-layer{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg-deep);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);}
.cover-layer.cover-hidden{opacity:0;transform:translateY(-100%);pointer-events:none;}
.cover-inner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 24px;gap:6px;max-width:400px;width:100%;}
.cover-ornament{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--accent-primary));margin-bottom:14px;opacity:0;animation:coverFadeDown .8s ease forwards;animation-delay:.15s;}
.cover-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#0a0e14;box-shadow:0 10px 36px rgba(224,166,58,.25);margin-bottom:18px;opacity:0;animation:coverFadeUp .8s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.3s;overflow:hidden;cursor:pointer;}
.cover-avatar img{width:100%;height:100%;object-fit:cover;}
.cover-eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);opacity:0;animation:coverFadeUp .7s ease forwards;animation-delay:.45s;}
.cover-title{font-size:28px;font-weight:900;letter-spacing:-.02em;line-height:1.15;margin:8px 0 4px;opacity:0;animation:coverFadeUp .8s ease forwards;animation-delay:.55s;}
.cover-sub{font-size:11px;color:var(--text-tertiary);font-weight:500;margin-bottom:20px;opacity:0;animation:coverFadeUp .7s ease forwards;animation-delay:.7s;}
.cover-actions{display:flex;flex-direction:row;flex-wrap:wrap;gap:10px;width:100%;opacity:0;animation:coverFadeUp .7s ease forwards;animation-delay:.85s;margin-bottom:16px;}
.cover-btn{flex:1 1 28%;min-width:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border-radius:var(--radius-md);font-size:11.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-primary);font-family:'Inter';transition:var(--transition-fast);}
.cover-btn i{font-size:18px;}
.cover-btn:active{transform:scale(.97);}
.cover-btn.guruwali{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:#a78bfa;}
.cover-btn.perwalian{background:rgba(224,166,58,.1);border-color:rgba(224,166,58,.3);color:var(--accent-primary);}
.cover-btn.matematika{background:rgba(79,168,147,.1);border-color:rgba(79,168,147,.3);color:var(--accent-secondary);}
.cover-btn.laporan{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:#38bdf8;}
@keyframes coverFadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes coverFadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:.6;transform:translateY(0);}}

.navbar{height:52px;background:rgba(17,22,30,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;z-index:100;}
.btn-nav-back,.btn-settings{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:var(--transition-fast);}
.btn-nav-back:active,.btn-settings:active{transform:scale(.94);}
.btn-nav-back.disabled{opacity:.3;pointer-events:none;}
.nav-title-group{display:flex;flex-direction:column;flex:1;min-width:0;}
.nav-title{font-size:13px;font-weight:800;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-subtitle{font-size:9px;color:var(--text-tertiary);font-weight:600;letter-spacing:.03em;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-tertiary);flex-shrink:0;transition:.2s;}
.sync-dot.ok{background:var(--accent-green);box-shadow:0 0 6px rgba(74,222,128,.6);}
.sync-dot.busy{background:var(--accent-primary);animation:pulseDot 1s infinite;}
.sync-dot.err{background:var(--accent-red);}
.sync-dot.offline{background:var(--text-tertiary);border:2px solid var(--accent-primary);}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.3;}}

.screen-stack{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:var(--safe-bottom);}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-tertiary);margin-bottom:16px;flex-wrap:wrap;}
.breadcrumb .clickable{cursor:pointer;color:var(--accent-primary);}
.breadcrumb .clickable:hover{text-decoration:underline;}

.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.card-item{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;transition:.2s;font-weight:600;font-size:13px;}
.card-item:active{transform:scale(.96);background:var(--bg-hover);}
.card-item i{display:block;font-size:20px;margin-bottom:8px;color:var(--accent-primary);}
.card-item .badge{font-size:10px;font-weight:400;color:var(--text-tertiary);margin-top:4px;}
.card-item.add-card{border-style:dashed;color:var(--text-tertiary);}
.card-item.add-card i{color:var(--text-tertiary);}

.student-list{display:flex;flex-direction:column;gap:8px;}
.student-item{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:.2s;cursor:pointer;}
.student-item:active{transform:scale(.99);background:var(--bg-hover);}
.student-item.open{border-radius:10px 10px 0 0;border-bottom-color:transparent;}
.student-item .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0a0e14;flex-shrink:0;}
.student-item .info{flex:1;min-width:0;}
.student-item .name{font-weight:600;font-size:14px;}
.student-item .class-label{font-size:11px;color:var(--text-tertiary);}
.student-item .status{font-size:10px;padding:4px 10px;border-radius:20px;background:rgba(248,113,113,.15);color:var(--accent-red);font-weight:600;flex-shrink:0;}
.student-item .status.clean{background:rgba(74,222,128,.12);color:var(--accent-green);}
.student-item .del-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-tertiary);font-size:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.student-item .del-btn:active{transform:scale(.9);color:var(--accent-red);}

.detail-panel{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-top:none;border-radius:0 0 12px 12px;padding:16px;margin-top:-2px;animation:slideDown .2s cubic-bezier(.4,0,.2,1);}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.type-chip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.type-chip{padding:10px 8px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-deep);color:var(--text-secondary);font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:.15s;line-height:1.3;}
.type-chip:active{transform:scale(.96);}
.type-chip.selected{background:rgba(224,166,58,.15);border-color:rgba(224,166,58,.5);color:var(--accent-primary);}
.type-chip .chip-icon{font-size:17px;display:block;margin-bottom:4px;}
.detail-label{font-size:10px;font-weight:700;color:var(--text-tertiary);letter-spacing:.06em;margin-bottom:8px;}
.detail-note{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-deep);color:var(--text-primary);font-size:12px;font-family:'Inter';resize:vertical;min-height:64px;margin-bottom:10px;}
.detail-note:focus{outline:none;border-color:var(--accent-primary);}
.btn-inline{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:#0a0e14;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:14px;font-family:'Inter';}
.btn-inline:active{transform:scale(.97);opacity:.9;}
.riwayat-header{font-size:10px;color:var(--text-tertiary);font-weight:700;letter-spacing:.06em;margin-bottom:8px;border-top:1px solid var(--border-subtle);padding-top:12px;}
.riwayat-item{background:var(--bg-deep);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--accent-red);position:relative;}
.riwayat-item .r-type{font-weight:600;font-size:12px;padding-right:24px;}
.riwayat-item .r-note{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.riwayat-item .r-date{font-size:9px;color:var(--text-tertiary);margin-top:2px;}
.riwayat-item .r-delete{position:absolute;top:8px;right:8px;color:var(--accent-red);cursor:pointer;font-size:11px;background:none;border:none;padding:2px 4px;}

.att-row{display:flex;align-items:center;gap:10px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:10px;padding:12px 14px;margin-bottom:8px;flex-wrap:wrap;}
.att-row .name{flex:1;min-width:100px;font-size:13px;font-weight:600;}
.att-opts{display:flex;gap:6px;flex-wrap:wrap;}
.att-chip{font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-deep);color:var(--text-secondary);cursor:pointer;font-weight:600;}
.att-chip.on[data-v="Hadir"]{background:rgba(74,222,128,.15);color:var(--accent-green);border-color:rgba(74,222,128,.4);}
.att-chip.on[data-v="Izin"]{background:rgba(56,189,248,.15);color:#38bdf8;border-color:rgba(56,189,248,.4);}
.att-chip.on[data-v="Sakit"]{background:rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.4);}
.att-chip.on[data-v="Dispen"]{background:rgba(79,168,147,.15);color:var(--accent-secondary);border-color:rgba(79,168,147,.4);}
.att-chip.on[data-v="Telat"]{background:rgba(224,166,58,.15);color:var(--accent-primary);border-color:rgba(224,166,58,.4);}
.att-chip.on[data-v="Alpa"]{background:rgba(248,113,113,.15);color:var(--accent-red);border-color:rgba(248,113,113,.4);}

.date-picker-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.date-picker-row input[type="date"]{background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-primary);border-radius:8px;padding:8px 10px;font-size:12px;font-family:'Inter';}

.add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.add-row input{flex:1;min-width:120px;background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-primary);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Inter';}
.add-row input:focus{outline:none;border-color:var(--accent-primary);}
.add-row button{background:var(--accent-primary);color:#0a0e14;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0;}
.add-row .btn-bulk{background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--accent-primary);}

table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
thead th{text-align:left;color:var(--text-tertiary);font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:8px 8px;border-bottom:1px solid var(--border-subtle);white-space:nowrap;}
tbody td{padding:6px 8px;border-bottom:1px solid var(--border-subtle);}
tbody tr:hover{background:var(--bg-hover);}
td input{width:100%;padding:5px 6px;font-size:12px;text-align:center;background:var(--bg-deep);border:1px solid var(--border-default);border-radius:6px;color:var(--text-primary);font-family:'Inter';}
.table-wrap{overflow-x:auto;}
.section-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.section-title-row h2{font-size:15px;font-weight:800;}
.btn-sm{background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-secondary);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-sm:active{transform:scale(.96);}

.empty-state{text-align:center;color:var(--text-tertiary);padding:40px 10px;font-size:13px;}
.empty-state i{display:block;font-size:26px;margin-bottom:10px;}

.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalFade .25s ease;}
@keyframes modalFade{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:16px;padding:22px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-box h3{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close:active{transform:scale(.94);}
.settings-block{margin-bottom:18px;}
.settings-block label{font-size:11px;font-weight:700;color:var(--text-secondary);display:block;margin-bottom:10px;letter-spacing:.03em;}
.accent-grid{display:flex;gap:10px;}
.accent-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border-default);cursor:pointer;flex-shrink:0;}
.accent-btn.active{border-color:var(--text-primary);box-shadow:0 0 0 2px var(--bg-surface),0 0 0 4px var(--text-primary);}
.avatar-upload-row{display:flex;align-items:center;gap:12px;}
.avatar-preview{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));display:flex;align-items:center;justify-content:center;font-weight:800;color:#0a0e14;overflow:hidden;flex-shrink:0;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;}
.btn-submit{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:#0a0e14;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter';margin-top:4px;}
.btn-submit:active{transform:scale(.97);}
.bulk-textarea{width:100%;min-height:180px;padding:12px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-deep);color:var(--text-primary);font-size:13px;font-family:'Inter';resize:vertical;margin-bottom:8px;}
.bulk-textarea:focus{outline:none;border-color:var(--accent-primary);}
.bulk-hint{font-size:11px;color:var(--text-tertiary);margin-bottom:12px;line-height:1.5;}
.bulk-result{font-size:12px;margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(74,222,128,.1);color:var(--accent-green);display:none;}
.bulk-result.show{display:block;}
hr{border:none;border-top:1px solid var(--border-subtle);margin:14px 0;}

/* Guru Wali: biodata form, share link, semester tabs */
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:700;color:var(--text-secondary);display:block;margin-bottom:6px;letter-spacing:.02em;}
.form-input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-deep);color:var(--text-primary);font-size:13px;font-family:'Inter';}
.form-input:focus{outline:none;border-color:var(--accent-primary);}
textarea.form-input{resize:vertical;min-height:60px;}
.wali-share-box{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:10px;padding:14px;margin-bottom:16px;}
.wali-link-row{display:flex;gap:8px;margin-bottom:8px;}
.wali-link-row input{flex:1;min-width:0;background:var(--bg-deep);border:1px solid var(--border-default);color:var(--text-secondary);border-radius:8px;padding:8px 10px;font-size:10.5px;font-family:monospace;}
.sem-tab-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sem-tab{padding:8px 14px;border-radius:20px;border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-secondary);font-size:12px;font-weight:700;cursor:pointer;}
.sem-tab.active{background:rgba(224,166,58,.15);border-color:rgba(224,166,58,.5);color:var(--accent-primary);}

/* Standalone student self-fill screen */
.standalone-wrap{position:fixed;inset:0;z-index:5000;background:var(--bg-deep);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.standalone-inner{max-width:480px;margin:0 auto;padding:28px 18px 50px;}
.standalone-header{text-align:center;margin-bottom:22px;}
.standalone-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#0a0e14;margin:0 auto 12px;}

/* ---------- Laporan: PDF worksheet builder ---------- */

<script>
/* ---------- Firebase ---------- */

  { key:'jk', label:'Jenis Kelamin', type:'select', options:['Laki-laki','Perempuan'] },

  { key:'alamat', label:'Alamat', type:'textarea' },
  { key:'namaIbu', label:'Nama Ibu', type:'text' },
  { key:'noHpIbu', label:'No. HP Ibu', type:'text' },

  { key:'alamatRumah', label:'Alamat Rumah', type:'textarea' },

];

let state = {
  avatar:null, accent:'amber',
  guruWali:{ className:'Wali Kelas', students:[], biodata:{}, raportColumns:{}, raportValues:{} },
  homeroom:{ className:'Kelas Perwalian', students:[], attendance:{}, violations:[] },
  mathClasses:[],
  reportTemplates:[]
};
let path = [];               // navigation stack, e.g. ['perwalian','kehadiran']
let openStudentKey = null;    // studentId whose violation panel is open
let selectedType = null;
let attDate = todayStr();
let currentSemester = 1;      // for Guru Wali > Nilai Raport

function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function setSync(status){
  const d=document.getElementById('syncDot'); if(!d) return;
  d.className='sync-dot '+status;
  const labels = { ok:'Tersinkron ke Firebase', busy:'Menyimpan...', err:'Gagal sinkron, dicoba lagi otomatis', offline:'Mode offline — perubahan disimpan di HP, akan disinkron otomatis kalau online lagi' };
  d.title = labels[status] || '';
}

/* ---------- persistence: offline-first (localStorage) + background sync to Firebase ---------- */
const LOCAL_CACHE_KEY = 'dwiSeptianaApp_cache_v1';
const PENDING_KEY = 'dwiSeptianaApp_pendingSync_v1';
let lastSentJSON = null;
let firstLoadDone = false;
let realtimeAttached = false;

function readLocal(key){ try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : null; }catch(e){ return null; } }
function writeLocal(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.error('Gagal simpan lokal', e); } }
function setPendingSync(val){ writeLocal(PENDING_KEY, !!val); }
function hasPendingSync(){ return readLocal(PENDING_KEY) === true; }

function loadState(){
  // 1) Render instantly from local cache — works fully offline, no waiting on network.
  const cached = readLocal(LOCAL_CACHE_KEY);
  if(cached){
    state = sanitizeIncoming(cached);
    applyAccent(state.accent);
    renderCoverAvatar();
    render();
  }
  setSync(navigator.onLine ? 'busy' : 'offline');

  // 2) In the background, try to reach Firebase for the freshest data.
  db.ref(DATA_PATH).once('value').then(snap=>{
    const data = snap.val();
    firstLoadDone = true;
    if(hasPendingSync()){
      // We have local changes made while offline — push those up instead of overwriting them.
      pushToFirebase();
    } else if(data){
      state = sanitizeIncoming(data);
      writeLocal(LOCAL_CACHE_KEY, state);
      applyAccent(state.accent);
      renderCoverAvatar();
      render();
      setSync('ok');
    } else if(!cached){
      saveState(); // first run ever, nothing on server or locally yet
    } else {
      setSync('ok');
    }
    listenRealtime();
  }).catch(err=>{
    console.error('Gagal memuat data Firebase (kemungkinan offline)', err);
    setSync(navigator.onLine ? 'err' : 'offline');
    if(!cached){ applyAccent(state.accent); renderCoverAvatar(); render(); }
    listenRealtime(); // harmless to attach now; Firebase SDK will connect once network is back
  });
}

function listenRealtime(){
  if(realtimeAttached) return;
  realtimeAttached = true;
  db.ref(DATA_PATH).on('value', snap=>{
    const data = snap.val();
    if(!data) return;
    const json = JSON.stringify(data);
    if(json === lastSentJSON) return; // echo of our own write, already applied locally
    if(hasPendingSync()) return; // don't let a stale remote snapshot clobber unsynced local changes
    state = sanitizeIncoming(data);
    writeLocal(LOCAL_CACHE_KEY, state);
    applyAccent(state.accent);
    renderCoverAvatar();
    render();
    setSync('ok');
  }, err=>{ console.error('Realtime sync error', err); setSync(navigator.onLine ? 'err' : 'offline'); });
}

window.addEventListener('online', ()=>{
  setSync('busy');
  listenRealtime();
  if(hasPendingSync()) pushToFirebase();
  flushPendingStandalone();
});
window.addEventListener('offline', ()=>{ setSync('offline'); });

// Firebase turns arrays-with-holes / all-numeric-key objects into objects; normalize back.
function sanitizeIncoming(data){
  const out = Object.assign({ avatar:null, accent:'amber',
    guruWali:{ className:'Wali Kelas', students:[], biodata:{}, raportColumns:{}, raportValues:{} },
    homeroom:{ className:'Kelas Perwalian', students:[], attendance:{}, violations:[] },
    mathClasses:[],
    reportTemplates:[] }, data);
  out.guruWali = out.guruWali || { className:'Wali Kelas', students:[], biodata:{}, raportColumns:{}, raportValues:{} };
  out.guruWali.students = toArray(out.guruWali.students);
  out.guruWali.biodata = out.guruWali.biodata || {};
  out.guruWali.raportColumns = out.guruWali.raportColumns || {};
  out.guruWali.raportValues = out.guruWali.raportValues || {};
  out.homeroom = out.homeroom || { className:'Kelas Perwalian', students:[], attendance:{}, violations:[], biodata:{} };
  out.homeroom.students = toArray(out.homeroom.students);
  out.homeroom.violations = toArray(out.homeroom.violations);
  out.homeroom.attendance = out.homeroom.attendance || {};
  out.homeroom.biodata = out.homeroom.biodata || {};
  out.mathClasses = toArray(out.mathClasses).map(c=>({
    id:c.id, className:c.className,
    students: toArray(c.students),
    attendance: c.attendance || {},
    tugasColumns: toArray(c.tugasColumns).length ? toArray(c.tugasColumns) : ['Tugas 1'],
    tugasValues: c.tugasValues || {},
    ujianColumns: toArray(c.ujianColumns).length ? toArray(c.ujianColumns) : ['UH 1'],
    ujianValues: c.ujianValues || {}
  }));
  out.reportTemplates = toArray(out.reportTemplates).map(t=>({
    id:t.id, name:t.name, pdfBase64:t.pdfBase64, numPages:t.numPages||1,
    fields: toArray(t.fields),
    instances: toArray(t.instances).map(i=>({ id:i.id, name:i.name, createdAt:i.createdAt, values:i.values||{} }))
  }));
  return out;
}
function toArray(v){
  if(Array.isArray(v)) return v.filter(x=>x!==null && x!==undefined);
  if(v && typeof v === 'object') return Object.values(v).filter(x=>x!==null && x!==undefined);
  return [];
}
// Firebase rejects `undefined` values — strip them recursively before writing.
function stripUndefined(obj){
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  if(obj && typeof obj === 'object'){
    const out = {};
    Object.keys(obj).forEach(k=>{ if(obj[k] !== undefined) out[k] = stripUndefined(obj[k]); });
    return out;
  }
  return obj;
}

let saveTimer=null;
function saveState(){
  writeLocal(LOCAL_CACHE_KEY, state); // instant local save — always works, even fully offline
  clearTimeout(saveTimer);
  setSync(navigator.onLine ? 'busy' : 'offline');
  saveTimer = setTimeout(pushToFirebase, 350);
}
function pushToFirebase(){
  const clean = stripUndefined(state);
  const json = JSON.stringify(clean);
  lastSentJSON = json;
  db.ref(DATA_PATH).set(clean).then(()=>{
    setSync('ok');
    setPendingSync(false);
  }).catch(err=>{
    console.error('Gagal menyimpan ke Firebase, tersimpan di HP & akan disinkron otomatis', err);
    setSync(navigator.onLine ? 'err' : 'offline');
    setPendingSync(true);
  });
}

function applyAccent(name){
  const a = ACCENTS[name] || ACCENTS.amber;
  document.documentElement.style.setProperty('--accent-primary', a.p);
  document.documentElement.style.setProperty('--accent-secondary', a.s);
}
function renderCoverAvatar(){
  const c = document.getElementById('coverAvatar');
  c.innerHTML = state.avatar ? `<img src="${state.avatar}">` : 'DS';
}

/* ---------- navigation (History API — makes phone/gesture back button navigate in-app) ---------- */
function syncHistory(){
  history.pushState({ path:[...path], panel:openStudentKey }, '', '');
}
window.openTop = function(section){
  path = [section];
  openStudentKey = null; selectedType = null;
  document.getElementById('coverLayer').classList.add('cover-hidden');
  syncHistory();
  render();
};
window.handleBack = function(){
  history.back(); // popstate listener below does the actual navigation
};
function navigate(seg){ path.push(seg); openStudentKey=null; selectedType=null; syncHistory(); render(); }
function navigateTo(newPath){ path = newPath; openStudentKey=null; selectedType=null; syncHistory(); render(); }

window.addEventListener('popstate', (e)=>{
  const st = e.state;
  path = (st && st.path) ? st.path : [];
  openStudentKey = st ? (st.panel || null) : null;
  selectedType = null;
  const cover = document.getElementById('coverLayer');
  if(path.length === 0) cover.classList.remove('cover-hidden'); else cover.classList.add('cover-hidden');
  render();
});

function updateBackButton(){
  const btn = document.getElementById('btnBack');
  if(path.length === 0) btn.classList.add('disabled'); else btn.classList.remove('disabled');
}

/* ---------- render dispatcher ---------- */
function render(){
  updateBackButton();
  const body = document.getElementById('mainBody');
  const titleEl = document.getElementById('navTitleText');
  const subEl = document.getElementById('navSubtitle');

  if(path.length === 0){ titleEl.textContent='Dwi Septiana'; subEl.textContent='Guru Matematika'; body.innerHTML=''; return; }

  let bc = `<span class="clickable" onclick="navigateTo([])">🏠</span>`;
  let html = '';

  if(path[0] === 'guruwali'){
    const cls = state.guruWali;
    titleEl.textContent = 'Guru Wali';
    if(path.length === 1){
      subEl.textContent = `${cls.className} — ${cls.students.length} siswa`;
      html = renderGuruWaliList(cls);
    } else {
      const student = cls.students.find(s=>s.id===path[1]);
      if(!student){ path=['guruwali']; render(); return; }
      if(path.length === 2){
        titleEl.textContent = student.name;
        subEl.textContent = 'Pilih menu';
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['guruwali'])">Guru Wali</span> <span>›</span> <span>${student.name}</span>`;
        html = `<div class="breadcrumb">${bc}</div>` + renderStudentWaliMenu();
      } else {
        const sub = path[2];
        titleEl.textContent = student.name;
        subEl.textContent = sub==='biodata' ? 'Biodata' : 'Nilai Raport';
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['guruwali'])">Guru Wali</span> <span>›</span> <span class="clickable" onclick="navigateTo(['guruwali','${student.id}'])">${student.name}</span> <span>›</span> <span>${sub==='biodata'?'Biodata':'Nilai Raport'}</span>`;
        html = `<div class="breadcrumb">${bc}</div>`;
        if(sub==='biodata') html += renderBiodataTab(cls, student);
        if(sub==='raport') html += renderRaportTab(cls, student);
      }
    }
  } else if(path[0] === 'perwalian'){
    titleEl.textContent = 'Perwalian';
    if(path.length === 1){
      subEl.textContent = 'Pilih menu';
      html = renderPerwalianMenu();
    } else if(path[1] === 'kehadiran'){
      subEl.textContent = 'Kehadiran Siswa';
      bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['perwalian'])">Perwalian</span> <span>›</span> <span>Kehadiran</span>`;
      html = `<div class="breadcrumb">${bc}</div>` + renderKehadiran(state.homeroom);
    } else if(path[1] === 'pelanggaran'){
      subEl.textContent = 'Rekap Pelanggaran';
      bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['perwalian'])">Perwalian</span> <span>›</span> <span>Pelanggaran</span>`;
      html = `<div class="breadcrumb">${bc}</div>` + renderPelanggaran(state.homeroom);
    } else if(path[1] === 'biodata'){
      if(path.length === 2){
        subEl.textContent = 'Biodata Siswa';
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['perwalian'])">Perwalian</span> <span>›</span> <span>Biodata</span>`;
        html = `<div class="breadcrumb">${bc}</div>` + renderHomeroomBiodataList(state.homeroom);
      } else {
        const student = state.homeroom.students.find(s=>s.id===path[2]);
        if(!student){ path=['perwalian','biodata']; render(); return; }
        subEl.textContent = student.name;
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['perwalian'])">Perwalian</span> <span>›</span> <span class="clickable" onclick="navigateTo(['perwalian','biodata'])">Biodata</span> <span>›</span> <span>${student.name}</span>`;
        html = `<div class="breadcrumb">${bc}</div>` + renderHomeroomBiodataTab(state.homeroom, student);
      }
    }
  } else if(path[0] === 'matematika'){
    titleEl.textContent = 'Guru Matematika';
    if(path.length === 1){
      subEl.textContent = `${state.mathClasses.length} kelas diajar`;
      html = renderClassList();
    } else {
      const cls = state.mathClasses.find(c=>c.id===path[1]);
      if(!cls){ path=['matematika']; render(); return; }
      if(path.length === 2){
        titleEl.textContent = cls.className;
        subEl.textContent = 'Pilih menu';
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['matematika'])">Kelas</span> <span>›</span> <span>${cls.className}</span>`;
        html = `<div class="breadcrumb">${bc}</div>` + renderClassMenu(cls);
      } else {
        const sub = path[2];
        const label = {keh:'Kehadiran', tugas:'Nilai Tugas', ujian:'Nilai Ujian'}[sub];
        titleEl.textContent = cls.className;
        subEl.textContent = label;
        bc += ` <span>›</span> <span class="clickable" onclick="navigateTo(['matematika'])">Kelas</span> <span>›</span> <span class="clickable" onclick="navigateTo(['matematika','${cls.id}'])">${cls.className}</span> <span>›</span> <span>${label}</span>`;
        html = `<div class="breadcrumb">${bc}</div>`;
        if(sub==='keh') html += renderKehadiran(cls);
        if(sub==='tugas') html += renderGrades(cls,'tugasColumns','tugasValues','Tugas');
        if(sub==='ujian') html += renderGrades(cls,'ujianColumns','ujianValues','UH');
      }
    }
  } else if(path[0] === 'laporan'){
    html = renderLaporanRoute(bc);
    titleEl.textContent = laporanTitleText;
    subEl.textContent = laporanSubText;
  }
  body.innerHTML = html;
  attachHandlers();
  afterRenderLaporan();
}

const GRADE_RANK = { 'X':10, 'XI':11, 'XII':12 };
function classSortKey(name){
  const m = (name||'').trim().match(/^(XII|XI|X)\s*[-.]?\s*(\d+)/i);
  if(m){
    const rank = GRADE_RANK[m[1].toUpperCase()] || 99;
    return rank * 100 + parseInt(m[2], 10);
  }
  return 9999; // format gak dikenali -> taruh paling belakang
}
function sortedMathClasses(){
  return [...state.mathClasses].sort((a,b)=> classSortKey(a.className) - classSortKey(b.className));
}

/* ---------- bulk add modal helpers ---------- */
function openModal(innerHtml){
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.onclick = e=>{ if(e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal-box">${innerHtml}</div>`;
  document.body.appendChild(modal);
  return modal;
}

function openBulkAddStudents(cls){
  const modal = openModal(`
    <div class="modal-header"><h3><i class="fa-solid fa-users" style="color:var(--accent-primary);"></i> Tambah Banyak Siswa</h3>
      <button class="modal-close" id="mClose"><i class="fa-solid fa-times"></i></button></div>
    <div class="bulk-hint">Tempel daftar nama, satu siswa per baris. Bisa juga tulis <b>Nama, No Absen</b> per baris kalau mau sekalian isi nomor absen. Nama yang sudah ada di kelas ini otomatis dilewati.</div>
    <textarea class="bulk-textarea" id="bulkText" placeholder="Contoh:
Ahmad Fauzi, 1
Bunga Lestari, 2
Citra Ayu
Dedi Kurniawan, 4"></textarea>
    <button class="btn-submit" id="bulkSubmit"><i class="fa-solid fa-check"></i> Tambahkan Semua</button>
    <div class="bulk-result" id="bulkResult"></div>
  `);
  modal.querySelector('#mClose').onclick = ()=>modal.remove();
  modal.querySelector('#bulkSubmit').onclick = ()=>{
    const raw = modal.querySelector('#bulkText').value;
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    const existingNames = new Set(cls.students.map(s=>s.name.trim().toLowerCase()));
    let added = 0, skipped = 0;
    lines.forEach(line=>{
      const parts = line.split(',').map(p=>p.trim());
      const name = parts[0];
      const absen = parts[1] || undefined;
      if(!name) return;
      const key = name.toLowerCase();
      if(existingNames.has(key)){ skipped++; return; }
      existingNames.add(key);
      const student = { id: uid(), name };
      if(absen) student.absen = absen;
      cls.students.push(student);
      added++;
    });
    if(added > 0){ saveState(); render(); }
    const resultEl = modal.querySelector('#bulkResult');
    resultEl.className = 'bulk-result show';
    resultEl.textContent = `✅ ${added} siswa ditambahkan${skipped?`, ${skipped} dilewati karena nama sudah ada`:''}.`;
    modal.querySelector('#bulkText').value = '';
    if(added > 0) setTimeout(()=>modal.remove(), 1100);
  };
}

/* ---------- event wiring (delegated per render) ---------- */
function attachHandlers(){
  const body = document.getElementById('mainBody');

  const dateInput = body.querySelector('#attDateInput');
  if(dateInput) dateInput.onchange = e=>{ attDate = e.target.value; render(); };

  const addStudentBtn = body.querySelector('#addStudentBtn');
  if(addStudentBtn){
    const cls = currentClass();
    const input = body.querySelector('#newStudentInput');
    const add = ()=>{
      const name=input.value.trim(); if(!name) return;
      const exists = cls.students.some(s=>s.name.trim().toLowerCase()===name.toLowerCase());
      if(exists){ alert('Nama siswa ini sudah ada di kelas.'); return; }
      cls.students.push({id:uid(), name}); saveState(); render();
    };
    addStudentBtn.onclick = add;
    input.onkeydown = e=>{ if(e.key==='Enter') add(); };
  }

  const bulkAddStudentBtn = body.querySelector('#bulkAddStudentBtn');

function currentClass(){

}
function fullDateTime(){
  const now = new Date();
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  return `${days[now.getDay()]}, ${now.getDate()} ${now.toLocaleDateString('id-ID',{month:'long'})} ${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

/* ---------- Guru Wali share link (name-based slug in URL, id-based storage) ---------- */
function slugifyName(name){
  return (name||'').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // strip accents
    .replace(/[^a-z0-9\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-|-$/g,'');
}
function waliLinkFor(student){
  return `${location.origin}${location.pathname}?wali=${encodeURIComponent(slugifyName(student.name))}`;
}
function hrLinkFor(student){
  return `${location.origin}${location.pathname}?hr=${encodeURIComponent(slugifyName(student.name))}`;
}
function copyAllLinks(cls, linkFn, btn){
  if(!cls.students.length) return;
  const nameCounts = {};
  cls.students.forEach(s=>{ const sl=slugifyName(s.name); nameCounts[sl]=(nameCounts[sl]||0)+1; });
  const dupes = Object.keys(nameCounts).filter(k=>nameCounts[k]>1);
  const text = cls.students.map(s=>`${s.name}: ${linkFn(s)}`).join('\n');
  const originalLabel = btn.innerHTML;
  const done = ()=>{
    btn.innerHTML = dupes.length ? '⚠️ Tersalin (ada nama sama!)' : '✅ Semua link tersalin!';
    setTimeout(()=>{ btn.innerHTML = originalLabel; }, 2200);
  };
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text, done);
  if(dupes.length){ alert('Perhatian: ada nama siswa yang sama persis, jadi link mereka bakal sama juga. Sebaiknya bedakan namanya (misal tambah inisial) biar link-nya unik per anak.'); }
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  done();
}

/* ---------- Excel export ---------- */
function exportExcel(){
  const wb = XLSX.utils.book_new();

  // Kehadiran Perwalian
  const hr = state.homeroom;
  if(hr.students.length){
    const rows = [['Siswa','No Absen', ...ATT_OPTS]];
    hr.students.forEach(s=>{
      const counts={}; ATT_OPTS.forEach(o=>counts[o]=0);
      Object.values(hr.attendance).forEach(rec=>{ if(rec[s.id]) counts[rec[s.id]]++; });
      rows.push([s.name, s.absen||'', ...ATT_OPTS.map(o=>counts[o])]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Kehadiran Perwalian');
  }

  // Pelanggaran
  if(hr.violations.length){
    const rows = [['Siswa','Jenis','Catatan','Tanggal']];
    hr.violations.forEach(v=>{
      const s = hr.students.find(s=>s.id===v.studentId);
      rows.push([s?s.name:'-', v.category, v.description||'-', v.date]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Pelanggaran');
  }

  // Math classes
  state.mathClasses.forEach(c=>{
    if(!c.students.length) return;
    const kehRows = [['Siswa','No Absen', ...ATT_OPTS]];
    c.students.forEach(s=>{
      const counts={}; ATT_OPTS.forEach(o=>counts[o]=0);
      Object.values(c.attendance).forEach(rec=>{ if(rec[s.id]) counts[rec[s.id]]++; });
      kehRows.push([s.name, s.absen||'', ...ATT_OPTS.map(o=>counts[o])]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kehRows), (c.className+' Keh').slice(0,31));

    const tugasRows = [['Siswa', ...c.tugasColumns]];
    c.students.forEach(s=>{ tugasRows.push([s.name, ...c.tugasColumns.map(col=>(c.tugasValues[s.id]&&c.tugasValues[s.id][col]!==undefined)?c.tugasValues[s.id][col]:'')]); });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tugasRows), (c.className+' Tugas').slice(0,31));

    const ujianRows = [['Siswa', ...c.ujianColumns]];
    c.students.forEach(s=>{ ujianRows.push([s.name, ...c.ujianColumns.map(col=>(c.ujianValues[s.id]&&c.ujianValues[s.id][col]!==undefined)?c.ujianValues[s.id][col]:'')]); });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ujianRows), (c.className+' Ujian').slice(0,31));
  });

  if(wb.SheetNames.length === 0){ alert('Belum ada data untuk diexport.'); return; }
  XLSX.writeFile(wb, 'Rekap_Dwi_Septiana.xlsx');
}

  if(sub === 'edit'){

    bc += ` <span>›</span> <span>Atur Lahan</span>`;
    return `<div class="breadcrumb">${bc}</div>` + renderTemplateEditor(tpl);

    return `<div class="breadcrumb">${bc}</div>` + renderFillScreen(tpl, null);

  if(sub === 'riwayat'){

      bc += ` <span>›</span> <span>Riwayat</span>`;
      return `<div class="breadcrumb">${bc}</div>` + renderInstanceList(tpl);

  html += `<div class="pdf-pages-scroll" id="pdfPagesScroll"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin-pulse"></i>Memuat PDF...</div></div>`;
  html += `<button class="btn-inline" id="saveInstanceBtn" style="margin-top:6px;"><i class="fa-solid fa-floppy-disk"></i> ${inst?'Simpan Perubahan':'Simpan Laporan'}</button>`;
  html += `<button class="btn-sm" id="downloadInstanceBtn" style="width:100%;padding:11px;"><i class="fa-solid fa-download"></i> Unduh sebagai PDF</button>`;
  return html;
}

/* ---------- render PDF pages ke canvas (dipanggil setelah HTML masuk ke DOM) ---------- */
function afterRenderLaporan(){
  if(path[0] !== 'laporan' || !pendingRenderTemplateId) { pendingRenderTemplateId = null; return; }
  const tpl = state.reportTemplates.find(t=>t.id===pendingRenderTemplateId);
  pendingRenderTemplateId = null;
  if(!tpl || !tpl.pdfBase64) return;
  const mode = path[2]; // 'edit' | 'new' | 'riwayat'
  const isEditor = mode === 'edit';
  const inst = isEditor ? null : (mode==='riwayat' ? laporanCurrentInstance(tpl) : null);
  renderAllPdfPages(tpl, isEditor, inst);
}

async function renderAllPdfPages(tpl, isEditor, inst){
  const scroll = document.getElementById('pdfPagesScroll');
  if(!scroll) return;
  try{
    const bytes = Uint8Array.from(atob(tpl.pdfBase64), c=>c.charCodeAt(0));
    const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
    scroll.innerHTML = '';
    pdfPageSizes = [];
    const targetWidth = Math.min(340, (window.innerWidth || 360) - 48);
    for(let p=1; p<=doc.numPages; p++){
      const page = await doc.getPage(p);
      const viewport0 = page.getViewport({ scale:1 });
      const scale = targetWidth / viewport0.width;
      const viewport = page.getViewport({ scale });
      const wrap = document.createElement('div');
      wrap.className = 'pdf-page-wrap';
      wrap.style.width = viewport.width+'px';
      wrap.style.height = viewport.height+'px';
      wrap.setAttribute('data-page', p);
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      const label = document.createElement('div');
      label.className = 'pdf-page-label';
      label.textContent = 'Hal. '+p;
      const layer = document.createElement('div');
      layer.className = 'field-layer';
      layer.setAttribute('data-page', p);
      wrap.appendChild(canvas); wrap.appendChild(label); wrap.appendChild(layer);
      scroll.appendChild(wrap);
      pdfPageSizes[p] = { width: viewport.width, height: viewport.height };
    }
    if(isEditor) wireEditorLayer(tpl);
    else wireFillLayer(tpl, inst);
  }catch(err){
    console.error('Gagal render PDF', err);
    scroll.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Gagal membuka PDF ini.</div>`;
  }
}

function renderFieldBoxes(tpl){

    layer.appendChild(box);
    wireFieldBoxDrag(box, tpl, f, layer.parentElement);

function wireFieldBoxDrag(box, tpl, f, wrapEl){
  const delBtn = box.querySelector('.fb-del');
  delBtn.onclick = (e)=>{
    e.stopPropagation();
    tpl.fields = tpl.fields.filter(x=>x.id!==f.id);
    saveState(); renderFieldBoxes(tpl); updateTemplateMeta(tpl);
    if(selectedFieldId===f.id) closeFieldSettings();
  };
  box.addEventListener('click', (e)=>{
    if(e.target===delBtn || e.target.closest('.fb-del') || e.target.closest('.fb-resize')) return;
    e.stopPropagation();
    selectedFieldId = f.id;
    renderFieldBoxes(tpl);
    openFieldSettings(tpl, f);
  });
  const resizeHandle = box.querySelector('.fb-resize');
  let dragging = null;
  const startDrag = (clientX, clientY, mode)=>{
    const rect = wrapEl.getBoundingClientRect();
    dragging = { mode, startX:clientX, startY:clientY, rect, origX:f.x, origY:f.y, origW:f.w, origH:f.h };
  };
  const moveDrag = (clientX, clientY)=>{
    if(!dragging) return;
    const dxPct = ((clientX - dragging.startX) / dragging.rect.width) * 100;
    const dyPct = ((clientY - dragging.startY) / dragging.rect.height) * 100;
    if(dragging.mode==='move'){
      f.x = Math.min(100-f.w, Math.max(0, dragging.origX + dxPct));
      f.y = Math.min(100-f.h, Math.max(0, dragging.origY + dyPct));
    } else {
      f.w = Math.min(100-f.x, Math.max(4, dragging.origW + dxPct));
      f.h = Math.min(100-f.y, Math.max(3, dragging.origH + dyPct));
    }
    box.style.left=f.x+'%'; box.style.top=f.y+'%'; box.style.width=f.w+'%'; box.style.height=f.h+'%';
  };
  const endDrag = ()=>{ if(dragging){ dragging=null; saveState(); if(selectedFieldId===f.id) syncFieldSettingsInputs(f); } };
  box.addEventListener('mousedown', e=>{ if(e.target.closest('.fb-resize')||e.target.closest('.fb-del')) return; e.preventDefault(); startDrag(e.clientX,e.clientY,'move'); });
  box.addEventListener('touchstart', e=>{ if(e.target.closest('.fb-resize')||e.target.closest('.fb-del')) return; const t=e.touches[0]; startDrag(t.clientX,t.clientY,'move'); }, {passive:true});
  resizeHandle.addEventListener('mousedown', e=>{ e.preventDefault(); e.stopPropagation(); startDrag(e.clientX,e.clientY,'resize'); });
  resizeHandle.addEventListener('touchstart', e=>{ e.stopPropagation(); const t=e.touches[0]; startDrag(t.clientX,t.clientY,'resize'); }, {passive:true});
  window.addEventListener('mousemove', e=>moveDrag(e.clientX,e.clientY));
  window.addEventListener('touchmove', e=>{ if(dragging && e.touches[0]) moveDrag(e.touches[0].clientX,e.touches[0].clientY); }, {passive:true});
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
}

/* ---------- fill screen: kotak jadi input beneran ---------- */
function wireFillLayer(tpl, inst){
  const values = inst ? Object.assign({}, inst.values) : {};
  window.currentFillValues = values;
  tpl.fields.forEach(f=>{
    const layer = document.querySelector(`.field-layer[data-page="${f.page}"]`);

    holder.style.left=f.x+'%'; holder.style.top=f.y+'%'; holder.style.width=f.w+'%'; holder.style.height=f.h+'%';

    } else if(f.type==='checkbox'){
      holder.innerHTML = `<input type="checkbox" data-fval="${f.id}" ${val?'checked':''}>`;
    } else {
      holder.innerHTML = `<input type="text" data-fval="${f.id}" value="${(val||'').toString().replace(/"/g,'&quot;')}">`;
    }
    layer.appendChild(holder);
  });
  document.querySelectorAll('[data-fval]').forEach(inp=>{
    inp.oninput = ()=>{

    };

      tpl.instances.push(newInst);

    saveState();

    if(path[2]==='new'){ navigateTo(['laporan', tpl.id, 'riwayat', inst.id]); }

/* ---------- export: cetak isian ke PDF baru pakai pdf-lib ---------- */
async function exportInstanceToPdf(tpl, inst){
  try{
    const bytes = Uint8Array.from(atob(tpl.pdfBase64), c=>c.charCodeAt(0));
    const pdfDoc = await PDFLib.PDFDocument.load(bytes);
    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const pages = pdfDoc.getPages();
    tpl.fields.forEach(f=>{
      const page = pages[f.page-1];
      if(!page) return;
      const { width, height } = page.getSize();
      const val = inst.values[f.id];
      const boxX = (f.x/100) * width;
      const boxY = height - (f.y/100)*height - (f.h/100)*height; // PDF y itu dari bawah
      const boxW = (f.w/100) * width;
      const boxH = (f.h/100) * height;
      if(f.type==='checkbox'){
        if(val){ page.drawText('X', { x: boxX + boxW*0.25, y: boxY + boxH*0.2, size: Math.max(8, boxH*0.7), font, color: PDFLib.rgb(0.1,0.1,0.1) }); }
      } else {
        const text = (val||'').toString();
        const fontSize = Math.max(7, Math.min(11, boxH*0.55));
        const maxCharsPerLine = Math.max(6, Math.floor(boxW / (fontSize*0.52)));
        const words = text.split(/\s+/);
        let lines = []; let cur = '';
        words.forEach(w=>{
          if((cur+' '+w).trim().length > maxCharsPerLine){ lines.push(cur.trim()); cur = w; }
          else cur = (cur+' '+w).trim();
        });
        if(cur) lines.push(cur);
        const maxLines = Math.max(1, Math.floor(boxH / (fontSize*1.25)));
        lines = lines.slice(0, maxLines);
        lines.forEach((line, idx)=>{
          page.drawText(line, { x: boxX+2, y: boxY + boxH - (idx+1)*(fontSize*1.2), size: fontSize, font, color: PDFLib.rgb(0.05,0.05,0.05) });
        });
      }
    });
    const outBytes = await pdfDoc.save();
    const blob = new Blob([outBytes], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (inst.name||'Laporan').replace(/[^a-z0-9 _-]/gi,'') + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }catch(err){
    console.error('Gagal export PDF', err);
    alert('Gagal membuat PDF. Coba lagi ya.');
  }
}

/* ---------- Standalone student self-fill mode ----------
   ?wali=NAME_SLUG -> Guru Wali roster: Biodata + Nilai Raport (Smt 1-5)
   ?hr=NAME_SLUG   -> Perwalian roster: Biodata only
*/
const PENDING_STANDALONE_KEY = 'dwiSeptianaApp_pendingStandalone_v1';
function standaloneCacheKey(source, id){ return 'dwiSeptianaApp_standalone_' + source + '_' + id; }

// Generic offline write queue: keyed by the exact Firebase path being written to.
function queuePendingWrite(path, data){
  const p = readLocal(PENDING_STANDALONE_KEY) || {};
  p[path] = data;
  writeLocal(PENDING_STANDALONE_KEY, p);
}
function flushPendingStandalone(){
  const pending = readLocal(PENDING_STANDALONE_KEY) || {};
  const paths = Object.keys(pending);
  if(paths.length === 0) return;
  paths.forEach(path=>{
    db.ref(path).set(pending[path]).then(()=>{
      const p = readLocal(PENDING_STANDALONE_KEY) || {};
      delete p[path];
      writeLocal(PENDING_STANDALONE_KEY, p);
    }).catch(err=>console.error('Gagal sinkron data offline', err));
  });
}
function saveStandaloneWrite(path, data, resultEl, successMsg){
  resultEl.className = 'bulk-result show';
  if(navigator.onLine){
    db.ref(path).set(data).then(()=>{
      resultEl.textContent = successMsg;
    }).catch(err=>{
      console.error('Gagal menyimpan, disimpan di HP dulu', err);
      queuePendingWrite(path, data);
      resultEl.textContent = '📴 Internet lagi gangguan. Tersimpan di HP, nanti otomatis terkirim.';
    });
  } else {
    queuePendingWrite(path, data);
    resultEl.textContent = '📴 Tersimpan di HP (offline). Nanti otomatis terkirim kalau internet nyala.';
  }
}
function sanitizeRaportColumns(raw){
  raw = raw || {};
  const out = {};
  for(let s=1;s<=5;s++){ out[s] = toArray(raw[s]); }
  return out;
}
function renderRaportFormHtml(columns, values){
  if(!columns || !columns.length){
    return `<div class="empty-state" style="padding:24px 10px;"><i class="fa-solid fa-graduation-cap"></i>Guru belum menambahkan mata pelajaran untuk semester ini.</div>`;
  }
  return columns.map(col=>{
    const v = (values && values[col] !== undefined) ? values[col] : '';
    return `<div class="form-group"><label class="form-label">${col}</label><input type="number" class="form-input" data-raport-col="${col}" value="${v}"></div>`;
  }).join('');
}

/* ---- ?wali= : Guru Wali roster, Biodata + Nilai Raport ---- */
let standaloneTab = 'biodata';
let standaloneSem = 1;

function initStandaloneWali(idParam){
  document.getElementById('splashScreen').style.display = 'none';
  document.getElementById('coverLayer').style.display = 'none';
  document.querySelector('.app-shell').style.display = 'none';
  document.getElementById('standaloneScreen').style.display = 'block';
  document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-spinner fa-spin-pulse"></i>Memuat...</div>`;

  const cacheKey = standaloneCacheKey('wali', idParam);
  const cached = readLocal(cacheKey);

  if(!navigator.onLine){
    if(cached){ renderStandaloneWaliForm(cacheKey, {...cached, isOffline:true}); }
    else { document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-wifi"></i>Belum pernah buka link ini pas online.<br>Sambungkan internet sekali dulu ya, habis itu bisa isi biodata & nilai raport offline kapan aja.</div>`; }
    return;
  }

  db.ref(DATA_PATH + '/guruWali/students').once('value').then(studSnap=>{
    const students = toArray(studSnap.val());
    const raw = decodeURIComponent(idParam || '');
    const slug = slugifyName(raw);
    const student = students.find(s => s && slugifyName(s.name) === slug) || students.find(s => s && s.id === raw);
    if(!student){
      if(cached){ renderStandaloneWaliForm(cacheKey, {...cached, isOffline:true}); }
      else document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Link tidak valid atau siswa tidak ditemukan.<br>Hubungi guru untuk link yang benar.</div>`;
      return;
    }
    return Promise.all([
      db.ref(DATA_PATH + '/guruWali/biodata/' + student.id).once('value'),
      db.ref(DATA_PATH + '/guruWali/raportColumns').once('value'),
      db.ref(DATA_PATH + '/guruWali/raportValues').once('value')
    ]).then(([bioSnap, colSnap, valSnap])=>{
      const ctx = {
        student,
        values: bioSnap.val() || {},
        raportColumns: sanitizeRaportColumns(colSnap.val()),
        raportValues: valSnap.val() || {},
        isOffline: false
      };
      writeLocal(cacheKey, ctx);
      renderStandaloneWaliForm(cacheKey, ctx);
    });
  }).catch(err=>{
    console.error('Gagal memuat data siswa', err);
    if(cached){ renderStandaloneWaliForm(cacheKey, {...cached, isOffline:true}); }
    else document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Gagal memuat data. Coba lagi nanti.</div>`;
  });
}
function renderStandaloneWaliForm(cacheKey, ctx){
  const { student, values, raportColumns, raportValues, isOffline } = ctx;
  const inner = document.getElementById('standaloneInner');
  inner.innerHTML = `
    <div class="standalone-header">
      <div class="standalone-avatar">${student.name.charAt(0)}</div>
      <div class="standalone-name">${student.name}</div>
      <div class="standalone-sub">${isOffline ? '📴 Mode offline — data akan disimpan di HP dan otomatis terkirim kalau internet nyala lagi.' : 'Isi biodata & nilai raport dirimu dengan lengkap dan benar ya 🙂'}</div>
    </div>
    <div class="sem-tab-row">
      <button class="sem-tab ${standaloneTab==='biodata'?'active':''}" id="stdTabBiodata" style="flex:1;">Biodata</button>
      <button class="sem-tab ${standaloneTab==='raport'?'active':''}" id="stdTabRaport" style="flex:1;">Nilai Raport</button>
    </div>
    <div id="standaloneTabBody"></div>
  `;
  inner.querySelector('#stdTabBiodata').onclick = ()=>{ standaloneTab='biodata'; renderStandaloneWaliForm(cacheKey, ctx); };
  inner.querySelector('#stdTabRaport').onclick = ()=>{ standaloneTab='raport'; renderStandaloneWaliForm(cacheKey, ctx); };

  const tabBody = inner.querySelector('#standaloneTabBody');
  if(standaloneTab === 'biodata'){
    tabBody.innerHTML = `${renderBiodataFormHtml(BIODATA_FIELDS, values)}<button class="btn-submit" id="standaloneSaveBtn">💾 Simpan Biodata</button><div class="bulk-result" id="standaloneResult"></div>`;
    tabBody.querySelector('#standaloneSaveBtn').onclick = ()=>{
      const data = {};
      tabBody.querySelectorAll('[data-field]').forEach(f=>{ data[f.getAttribute('data-field')] = f.value.trim(); });
      data.updatedAt = fullDateTime();
      ctx.values = data;
      writeLocal(cacheKey, ctx);
      const r = tabBody.querySelector('#standaloneResult');
      saveStandaloneWrite(DATA_PATH + '/guruWali/biodata/' + student.id, data, r, '✅ Biodata tersimpan! Terima kasih, ' + student.name.split(' ')[0] + '.');
    };
  } else {
    const cols = raportColumns[standaloneSem] || [];
    const semVals = (raportValues[standaloneSem] && raportValues[standaloneSem][student.id]) || {};
    const semTabs = [1,2,3,4,5].map(s=>`<button class="sem-tab ${standaloneSem===s?'active':''}" data-sem="${s}" style="font-size:11px;padding:6px 10px;">Smt ${s}</button>`).join('');
    tabBody.innerHTML = `<div class="sem-tab-row">${semTabs}</div>${renderRaportFormHtml(cols, semVals)}
      ${cols.length ? `<button class="btn-submit" id="standaloneSaveRaportBtn">💾 Simpan Nilai Raport Smt ${standaloneSem}</button>` : ''}
      <div class="bulk-result" id="standaloneResult"></div>`;
    tabBody.querySelectorAll('.sem-tab[data-sem]').forEach(btn=>{
      btn.onclick = ()=>{ standaloneSem = Number(btn.getAttribute('data-sem')); renderStandaloneWaliForm(cacheKey, ctx); };
    });
    const saveRaportBtn = tabBody.querySelector('#standaloneSaveRaportBtn');
    if(saveRaportBtn) saveRaportBtn.onclick = ()=>{
      const data = {};
      tabBody.querySelectorAll('[data-raport-col]').forEach(f=>{
        if(f.value !== '') data[f.getAttribute('data-raport-col')] = Number(f.value);
      });
      if(!ctx.raportValues[standaloneSem]) ctx.raportValues[standaloneSem] = {};
      ctx.raportValues[standaloneSem][student.id] = data;
      writeLocal(cacheKey, ctx);
      const r = tabBody.querySelector('#standaloneResult');
      saveStandaloneWrite(DATA_PATH + '/guruWali/raportValues/' + standaloneSem + '/' + student.id, data, r, '✅ Nilai raport Semester ' + standaloneSem + ' tersimpan!');
    };
  }
}

/* ---- ?hr= : Perwalian (homeroom) roster, Biodata only ---- */
function initStandaloneHomeroom(idParam){
  document.getElementById('splashScreen').style.display = 'none';
  document.getElementById('coverLayer').style.display = 'none';
  document.querySelector('.app-shell').style.display = 'none';
  document.getElementById('standaloneScreen').style.display = 'block';
  document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-spinner fa-spin-pulse"></i>Memuat...</div>`;

  const cacheKey = standaloneCacheKey('hr', idParam);
  const cached = readLocal(cacheKey);

  if(!navigator.onLine){
    if(cached){ renderStandaloneHomeroomForm(cacheKey, cached.student, cached.values, true); }
    else { document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-wifi"></i>Belum pernah buka link ini pas online.<br>Sambungkan internet sekali dulu ya, habis itu bisa isi biodata offline kapan aja.</div>`; }
    return;
  }

  db.ref(DATA_PATH + '/homeroom/students').once('value').then(studSnap=>{
    const students = toArray(studSnap.val());
    const raw = decodeURIComponent(idParam || '');
    const slug = slugifyName(raw);
    const student = students.find(s => s && slugifyName(s.name) === slug) || students.find(s => s && s.id === raw);
    if(!student){
      if(cached){ renderStandaloneHomeroomForm(cacheKey, cached.student, cached.values, true); }
      else document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Link tidak valid atau siswa tidak ditemukan.<br>Hubungi guru untuk link yang benar.</div>`;
      return;
    }
    return db.ref(DATA_PATH + '/homeroom/biodata/' + student.id).once('value').then(bioSnap=>{
      const values = bioSnap.val() || {};
      writeLocal(cacheKey, { student, values });
      renderStandaloneHomeroomForm(cacheKey, student, values, false);
    });
  }).catch(err=>{
    console.error('Gagal memuat data siswa', err);
    if(cached){ renderStandaloneHomeroomForm(cacheKey, cached.student, cached.values, true); }
    else document.getElementById('standaloneInner').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Gagal memuat data. Coba lagi nanti.</div>`;
  });
}
function renderStandaloneHomeroomForm(cacheKey, student, values, isOffline){
  const inner = document.getElementById('standaloneInner');
  inner.innerHTML = `
    <div class="standalone-header">
      <div class="standalone-avatar">${student.name.charAt(0)}</div>
      <div class="standalone-name">${student.name}</div>
      <div class="standalone-sub">${isOffline ? '📴 Mode offline — biodata akan disimpan di HP dan otomatis terkirim kalau internet nyala lagi.' : 'Isi biodata dirimu dengan lengkap dan benar ya 🙂'}</div>
    </div>
    ${renderBiodataFormHtml(HOMEROOM_BIODATA_FIELDS, values)}
    <button class="btn-submit" id="standaloneSaveBtn">💾 Simpan Biodata</button>
    <div class="bulk-result" id="standaloneResult"></div>
  `;
  inner.querySelector('#standaloneSaveBtn').onclick = ()=>{
    const data = {};
    inner.querySelectorAll('[data-field]').forEach(f=>{ data[f.getAttribute('data-field')] = f.value.trim(); });
    data.updatedAt = fullDateTime();
    writeLocal(cacheKey, { student, values: data });
    const r = inner.querySelector('#standaloneResult');
    saveStandaloneWrite(DATA_PATH + '/homeroom/biodata/' + student.id, data, r, '✅ Tersimpan! Terima kasih, ' + student.name.split(' ')[0] + '.');
  };
}

/* ---------- init ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=>console.error('Gagal daftar service worker (offline cache gak aktif)', err));
  });
}

const urlParams = new URLSearchParams(location.search);
const waliId = urlParams.get('wali');
const hrId = urlParams.get('hr');
if(waliId){
  initStandaloneWali(waliId);
} else if(hrId){
  initStandaloneHomeroom(hrId);
} else {
  history.replaceState({ path:[], panel:null }, '', ''); // baseline so hardware back button navigates in-app first
  setTimeout(()=>{ const s=document.getElementById('splashScreen'); if(s) s.style.display='none'; }, 2300);
  loadState();
}
</script>
